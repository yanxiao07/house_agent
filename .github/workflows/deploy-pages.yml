name: Deploy Web to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "web/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    env:
      VITE_BASE_PATH: /${{ github.event.repository.name }}/
      VITE_LANGGRAPH_API_URL: ${{ vars.LANGGRAPH_API_URL }}
      VITE_LANGGRAPH_ASSISTANT_ID: ${{ vars.LANGGRAPH_ASSISTANT_ID || 'house_agent' }}
      VITE_RENTAL_API_URL: ${{ vars.RENTAL_API_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Verify public agent endpoint
        run: |
          test -n "$VITE_LANGGRAPH_API_URL" || {
            echo "Set the repository Actions variable LANGGRAPH_API_URL before deploying."
            exit 1
          }
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
